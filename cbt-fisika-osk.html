<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi CBT – Seleksi OSK Fisika SMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInDocument()"></script>
<style>
:root {
  --navy: #0a1628;
  --blue: #1a56db;
  --blue-light: #3b82f6;
  --blue-pale: #dbeafe;
  --blue-ghost: #eff6ff;
  --accent: #f59e0b;
  --accent-pale: #fef3c7;
  --green: #10b981;
  --green-pale: #d1fae5;
  --red: #ef4444;
  --red-pale: #fee2e2;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --white: #ffffff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(10,22,40,0.10);
  --shadow-lg: 0 8px 40px rgba(10,22,40,0.16);
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--gray-50);
  color: var(--gray-800);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--navy) 0%, #1a3a6b 100%);
  color: var(--white);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(10,22,40,0.25);
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 36px; height: 36px;
  background: var(--blue);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: var(--white);
}
.header-title { font-size: 15px; font-weight: 700; line-height: 1.2; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 400; }

#timer-display {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 18px;
  border-radius: 8px;
  letter-spacing: 2px;
  color: #fff;
  transition: background 0.3s, color 0.3s;
}
#timer-display.warning { background: rgba(245,158,11,0.25); color: var(--accent); border-color: var(--accent); }
#timer-display.danger  { background: rgba(239,68,68,0.25); color: #fca5a5; border-color: var(--red); animation: pulse 1s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  min-height: calc(100vh - 64px);
}

/* ── Sidebar ── */
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--gray-200);
  padding: 20px;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.sidebar-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--gray-400);
  margin-bottom: 4px;
}

/* Progress bar */
.progress-bar-wrap { background: var(--gray-100); border-radius: 99px; height: 8px; overflow: hidden; }
.progress-bar-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--blue), var(--blue-light));
  transition: width 0.4s ease;
}
.progress-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

/* Nav grid */
.nav-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.nav-btn {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-500);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font);
}
.nav-btn:hover { border-color: var(--blue-light); color: var(--blue); background: var(--blue-ghost); }
.nav-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
.nav-btn.answered { background: var(--green-pale); border-color: var(--green); color: var(--green); }
.nav-btn.answered.active { background: var(--blue); color: var(--white); border-color: var(--blue); }

/* Legend */
.legend { display: flex; flex-direction: column; gap: 6px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-600); }
.legend-dot {
  width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
}
.ld-empty  { background: var(--white); border: 1.5px solid var(--gray-200); }
.ld-answered { background: var(--green-pale); border: 1.5px solid var(--green); }
.ld-active { background: var(--blue); }

/* Submit btn */
.btn-submit {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
  color: var(--white);
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(26,86,219,0.35);
}
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,86,219,0.45); }
.btn-submit:active { transform: translateY(0); }

/* ── Main content ── */
.main-content {
  padding: 28px 32px;
  max-width: 820px;
}

/* Question card */
.question-card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 20px;
}
.question-header {
  background: linear-gradient(90deg, var(--navy) 0%, #1a3a6b 100%);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.question-number {
  background: var(--blue);
  color: var(--white);
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800;
  flex-shrink: 0;
}
.question-topic { font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 500; }

.question-body { padding: 24px; }
.question-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--gray-800);
  margin-bottom: 20px;
}

/* Image placeholder */
.question-image-wrap {
  margin: 16px 0;
  background: var(--gray-50);
  border: 2px dashed var(--gray-200);
  border-radius: 10px;
  overflow: hidden;
  text-align: center;
}
.question-image-wrap img {
  max-width: 100%;
  max-height: 260px;
  object-fit: contain;
  display: block;
  margin: auto;
}
.img-placeholder {
  padding: 24px;
  color: var(--gray-400);
  font-size: 13px;
  font-style: italic;
}
.img-placeholder span { font-size: 28px; display: block; margin-bottom: 6px; }

/* Answer area */
.answer-area { display: flex; flex-direction: column; gap: 8px; }
.answer-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-600);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.answer-row { display: flex; align-items: center; gap: 12px; }
.answer-input {
  width: 160px;
  padding: 10px 14px;
  border: 2px solid var(--gray-200);
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--gray-800);
  background: var(--white);
  outline: none;
  transition: border 0.2s, box-shadow 0.2s;
}
.answer-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,86,219,0.12); }
.answer-input.filled { border-color: var(--green); background: var(--green-pale); }
.answer-unit {
  font-size: 14px;
  color: var(--gray-500);
  font-family: var(--mono);
}

/* Result overlay on input */
.answer-result-correct { border-color: var(--green) !important; background: var(--green-pale) !important; }
.answer-result-wrong   { border-color: var(--red) !important; background: var(--red-pale) !important; }
.result-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 99px;
  font-size: 12px; font-weight: 700;
}
.result-badge.correct { background: var(--green-pale); color: var(--green); }
.result-badge.wrong   { background: var(--red-pale); color: var(--red); }
.correct-answer-hint { font-size: 12px; color: var(--gray-500); margin-top: 4px; font-family: var(--mono); }

/* Navigation buttons */
.nav-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.btn-nav {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  background: var(--white);
  border: 2px solid var(--gray-200);
  border-radius: 10px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-600);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-nav:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); background: var(--blue-ghost); }
.btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-nav-next {
  background: var(--blue);
  border-color: var(--blue);
  color: var(--white);
}
.btn-nav-next:hover { background: #1649c4; border-color: #1649c4; color: var(--white); }

/* ── Score Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,22,40,0.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--white);
  border-radius: 20px;
  width: min(560px, 95vw);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  transform: scale(0.92);
  transition: transform 0.3s;
}
.modal-overlay.show .modal { transform: scale(1); }

.modal-header {
  background: linear-gradient(135deg, var(--navy), #1a3a6b);
  padding: 28px 32px 24px;
  text-align: center;
}
.modal-trophy { font-size: 52px; margin-bottom: 8px; }
.modal-title { font-size: 22px; font-weight: 800; color: var(--white); }
.modal-subtitle { font-size: 14px; color: rgba(255,255,255,0.6); }

.modal-body { padding: 28px 32px; }
.score-circle {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: conic-gradient(var(--blue) var(--pct, 0%), var(--gray-100) 0%);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  position: relative;
}
.score-circle::after {
  content: '';
  position: absolute;
  width: 88px; height: 88px;
  background: var(--white);
  border-radius: 50%;
}
.score-number {
  position: relative; z-index: 1;
  font-size: 28px; font-weight: 800;
  color: var(--navy);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stat-box {
  background: var(--gray-50);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}
.stat-value { font-size: 22px; font-weight: 800; color: var(--navy); }
.stat-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }

.btn-retry {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--blue), var(--blue-light));
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(26,86,219,0.3);
  transition: all 0.2s;
}
.btn-retry:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,86,219,0.4); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--gray-200);
    padding: 14px 16px;
    flex-direction: column;
  }
  .main-content { padding: 16px; }
  .header-title { font-size: 13px; }
  #timer-display { font-size: 18px; padding: 5px 12px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}

/* KaTeX sizing fix */
.katex { font-size: 1em !important; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">Ω</div>
    <div>
      <div class="header-title">Simulasi CBT Fisika</div>
      <div class="header-sub">Seleksi OSK SMA – 40 Soal</div>
    </div>
  </div>
  <div id="timer-display">90:00</div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-section-title">Progress</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">0 / 40 dijawab</div>
    </div>

    <div>
      <div class="sidebar-section-title">Navigasi Soal</div>
      <div class="nav-grid" id="nav-grid"></div>
    </div>

    <div class="legend">
      <div class="sidebar-section-title">Keterangan</div>
      <div class="legend-item"><div class="legend-dot ld-empty"></div> Belum dijawab</div>
      <div class="legend-item"><div class="legend-dot ld-answered"></div> Sudah dijawab</div>
      <div class="legend-item"><div class="legend-dot ld-active"></div> Soal aktif</div>
    </div>

    <button class="btn-submit" onclick="submitExam()">⬛ Selesai &amp; Nilai</button>
  </aside>

  <!-- Main -->
  <main class="main-content" id="main-content"></main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-trophy" id="modal-trophy">🎓</div>
      <div class="modal-title">Hasil Ujian</div>
      <div class="modal-subtitle">Seleksi OSK Fisika SMA</div>
    </div>
    <div class="modal-body">
      <div class="score-circle" id="score-circle">
        <div class="score-number" id="score-number">0</div>
      </div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="stat-correct" style="color:var(--green)">0</div>
          <div class="stat-label">Benar</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-wrong" style="color:var(--red)">0</div>
          <div class="stat-label">Salah</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-empty" style="color:var(--gray-400)">0</div>
          <div class="stat-label">Kosong</div>
        </div>
      </div>
      <button class="btn-retry" onclick="retryExam()">🔄 Coba Lagi</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// QUESTION DATA (40 soal)
// ─────────────────────────────────────────────
const questions = [
  {
    id: 1,
    text: `Sebuah proyektil ditembakkan dari permukaan tanah ke udara dengan kecepatan awal tertentu dan sudut elevasi $\\alpha$ terhadap horizontal. Percepatan gravitasi $g$ ke bawah. Hambatan udara dapat diabaikan. Jika tinggi maksimum proyektil sama dengan $h$, sedangkan jangkauan mendatar maksimum sama dengan $R$, maka terdapat hubungan: $\\tan\\alpha = n\\dfrac{h}{R}$ dengan nilai $n$ sama dengan ...`,
    answer: 4,
    unit: '',
    image: null,
    topic: 'Kinematika – Gerak Parabola'
  },
  {
    id: 2,
    text: `Sebuah balok bermassa 2 kg yang awalnya diam ditarik oleh gaya $F$ sebesar 12 N dan membentuk sudut $\\theta$ hingga bergerak seperti pada gambar. Jika diketahui lantai kasar dengan koefisien gesek kinetis 0,2, maka nilai $\\cot\\theta$ agar balok mencapai energi kinetik maksimum setelah bergerak sejauh 3 m adalah ...`,
    answer: 2,
    unit: '',
    image: 'images/soal2.png',
    topic: 'Dinamika – Gaya & Gesekan'
  },
  {
    id: 3,
    text: `Tinjaulah sebuah balok diam bermassa 10 kg. Kemudian balok tersebut didorong dengan gaya sebesar 200 N, tetapi balok tersebut tetap diam. Jika diketahui lantai kasar dengan koefisien gesek statis $\\mu_s$, maka pada sistem tersebut gaya geseknya sama dengan ... N.`,
    answer: 200,
    unit: 'N',
    image: null,
    topic: 'Dinamika – Keseimbangan'
  },
  {
    id: 4,
    text: `Dua bola identik dilepaskan dari ketinggian yang sama namun bola pertama diberikan kecepatan horizontal awal sebesar $v$ sedangkan bola kedua tidak. Diketahui bahwa bola pertama mengenai batu setinggi 5 m yang berada pada jarak $d$ dari titik awal, sedangkan bola kedua terdengar mengenai tanah beberapa saat kemudian. Jika diketahui bahwa $g\\dfrac{d^2}{v^2} = 20$ m, maka ketinggian awal bola kedua adalah ... m.`,
    answer: 15,
    unit: 'm',
    image: null,
    topic: 'Kinematika – Gerak Parabola'
  },
  {
    id: 5,
    text: `Sebuah silinder A berada di atas bidang miring balok B seperti ditunjukkan pada gambar. Jika gaya gesek antar semua permukaan diabaikan, kemiringan balok $\\alpha = 30^\\circ$ dan agar balok B dipercepat sebesar 2 m/s², maka percepatan gerak silinder A adalah ... m/s².`,
    answer: 4,
    unit: 'm/s²',
    image: 'images/soal5.png',
    topic: 'Dinamika – Sistem Benda'
  },
  {
    id: 6,
    text: `Sebuah kendaraan melintasi jalanan berbentuk setengah lingkaran berjari-jari $R = 160$ cm selama 10 detik. Jika gaya gesek udara diabaikan, maka kecepatan rata-rata kendaraan selama menempuh lintasan itu adalah ... cm/s.`,
    answer: 32,
    unit: 'cm/s',
    image: null,
    topic: 'Kinematika – Kecepatan Rata-Rata'
  },
  {
    id: 7,
    text: `Seseorang bermassa 80 kg melompat dari ketinggian 1 meter dan ia lupa menekuk lututnya pada saat mendarat. Tubuhnya mengalami perlambatan pada jarak satu cm. Gaya total yang ia rasakan pada kakinya selama perlambatan adalah ... N.`,
    answer: 78400,
    unit: 'N',
    image: null,
    topic: 'Dinamika – Impuls & Gaya'
  },
  {
    id: 8,
    text: `Mobil A berada 25 km di depan mobil B. Mula-mula mobil A bergerak maju meninggalkan mobil B dengan kecepatan awal 30 km/jam dan percepatan konstan 2 km/jam². Satu jam kemudian mobil B mulai bergerak menyusul mobil A dengan kecepatan awal 40 km/jam dan percepatan konstan 5 km/jam². Ketika mobil B tepat menyusul mobil A, kecepatan mobil B sama dengan ... km/jam.`,
    answer: 50,
    unit: 'km/jam',
    image: null,
    topic: 'Kinematika – GLBB'
  },
  {
    id: 9,
    text: `Dua bola diluncurkan dari permukaan tanah dengan kecepatan yang saling tegak lurus dengan laju masing-masingnya adalah $v_1 = 2$ m/s dan $v_2 = 2\\sqrt{3}$ m/s, dan diketahui pula bahwa sudut peluncuran bola pertama terhadap tanah adalah $30^\\circ$. Jika percepatan gravitasi adalah 10 m/s², maka lama waktu yang dibutuhkan hingga kecepatan kedua bola tegak lurus kembali adalah ... s.`,
    answer: 0.2,
    unit: 's',
    image: null,
    topic: 'Kinematika – Gerak Parabola'
  },
  {
    id: 10,
    text: `Sebuah partikel telah berpindah sepanjang lintasan pada bidang $xy$ dari titik 1 yang vektor posisinya $\\vec{r_1} = \\hat{i} + 2\\hat{j}$ ke titik 2 dengan vektor posisinya $\\vec{r_2} = 2\\hat{i} - 3\\hat{j}$. Selama waktu itu partikel tersebut mengalami gaya $\\vec{F} = 3\\hat{i} + 4\\hat{j}$. Jika $r_1, r_2$, dan $F$ dalam satuan SI, usaha yang dilakukan oleh gaya $F$ adalah ... J.`,
    answer: -17,
    unit: 'J',
    image: null,
    topic: 'Kerja & Energi – Usaha Vektor'
  },
  {
    id: 11,
    text: `Seorang anak ($m = 20$ kg) duduk di atas sebuah meja datar yang dapat diputar. Meja kemudian diputar dengan kecepatan sudut sebesar 2 rad/detik. Jika koefisien gesek si anak terhadap meja 0,4, maka jarak maksimum yang ditempuh secara radial oleh si anak di atas meja tanpa slip adalah ... cm.`,
    answer: 100,

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentQ = 0;
let answers = new Array(questions.length).fill('');
let submitted = false;
let timerSeconds = 90 * 60;
let timerInterval = null;

// ─────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────
function startTimer() {
  timerInterval = setInterval(() => {
    if (submitted) { clearInterval(timerInterval); return; }
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      submitExam(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = '';
  if (timerSeconds < 300) el.classList.add('danger');
  else if (timerSeconds < 900) el.classList.add('warning');
}

// ─────────────────────────────────────────────
// NAV GRID
// ─────────────────────────────────────────────
function buildNavGrid() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = i + 1;
    btn.id = `nav-${i}`;
    btn.onclick = () => goToQuestion(i);
    grid.appendChild(btn);
  });
}

function updateNavGrid() {
  questions.forEach((q, i) => {
    const btn = document.getElementById(`nav-${i}`);
    if (!btn) return;
    btn.className = 'nav-btn';
    if (i === currentQ) btn.classList.add('active');
    if (answers[i] !== '') btn.classList.add('answered');
  });
}

// ─────────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────────
function updateProgress() {
  const filled = answers.filter(a => a !== '').length;
  const pct = (filled / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${filled} / ${questions.length} dijawab`;
}

// ─────────────────────────────────────────────
// RENDER QUESTION
// ─────────────────────────────────────────────
function renderQuestion(idx) {
  const q = questions[idx];
  const isSubmitted = submitted;

  // Check answer correctness
  let resultHTML = '';
  if (isSubmitted && answers[idx] !== '') {
    const userVal = parseFloat(answers[idx]);
    const correct = Math.abs(userVal - q.answer) < 0.06 * Math.abs(q.answer) + 0.05;
    resultHTML = correct
      ? `<span class="result-badge correct">✓ Benar</span>`
      : `<span class="result-badge wrong">✗ Salah</span><div class="correct-answer-hint">Jawaban: ${q.answer} ${q.unit}</div>`;
  }

  const inputClass = isSubmitted && answers[idx] !== ''
    ? (Math.abs(parseFloat(answers[idx]) - q.answer) < 0.06 * Math.abs(q.answer) + 0.05 ? 'answer-result-correct' : 'answer-result-wrong')
    : (answers[idx] !== '' ? 'filled' : '');

  // Image section
  let imageHTML = '';
  if (q.image) {
    imageHTML = `
      <div class="question-image-wrap">
        <img src="${q.image}" alt="Gambar soal ${q.id}"
          onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><span>🖼️</span>Gambar: ${q.image}<br><small>Letakkan file di folder images/</small></div>'" />
      </div>`;
  }

  const html = `
    <div class="question-card">
      <div class="question-header">
        <div class="question-number">${q.id}</div>
        <div class="question-topic">${q.topic}</div>
      </div>
      <div class="question-body">
        <div class="question-text">${q.text}</div>
        ${imageHTML}
        <div class="answer-area">
          <div class="answer-label">Jawaban</div>
          <div class="answer-row">
            <input
              type="number"
              step="any"
              class="answer-input ${inputClass}"
              id="answer-input"
              value="${answers[idx]}"
              placeholder="0.0"
              ${isSubmitted ? 'disabled' : ''}
              oninput="saveAnswer(this.value)"
            />
            ${q.unit ? `<span class="answer-unit">${q.unit}</span>` : ''}
          </div>
          ${resultHTML}
        </div>
      </div>
    </div>
    <div class="nav-controls">
      <button class="btn-nav" onclick="goToQuestion(${idx-1})" ${idx===0?'disabled':''}>← Soal ${idx}</button>
      <span style="font-size:13px;color:var(--gray-400);font-weight:600">${idx+1} / ${questions.length}</span>
      <button class="btn-nav btn-nav-next" onclick="goToQuestion(${idx+1})" ${idx===questions.length-1?'disabled':''}>Soal ${idx+2} →</button>
    </div>
  `;
  document.getElementById('main-content').innerHTML = html;

  // Render math
  if (window.renderMathInElement) {
    renderMathInElement(document.getElementById('main-content'), {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
      ],
      throwOnError: false
    });
  }
}

function renderMathInDocument() {
  // Called by KaTeX auto-render onload, render existing content
  if (document.getElementById('main-content')) {
    renderMathInElement(document.getElementById('main-content'), {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
      ],
      throwOnError: false
    });
  }
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function goToQuestion(idx) {
  if (idx < 0 || idx >= questions.length) return;
  currentQ = idx;
  renderQuestion(currentQ);
  updateNavGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveAnswer(val) {
  answers[currentQ] = val.trim();
  updateNavGrid();
  updateProgress();
  // update input class
  const inp = document.getElementById('answer-input');
  if (inp) {
    inp.classList.toggle('filled', val.trim() !== '');
  }
}

// ─────────────────────────────────────────────
// SUBMIT
// ─────────────────────────────────────────────
function submitExam(auto = false) {
  if (submitted) return;

  const unanswered = answers.filter(a => a === '').length;
  if (!auto && unanswered > 0) {
    if (!confirm(`Masih ada ${unanswered} soal yang belum dijawab. Yakin ingin mengumpulkan?`)) return;
  }

  clearInterval(timerInterval);
  submitted = true;

  // Calculate score
  let correct = 0, wrong = 0, empty = 0;
  questions.forEach((q, i) => {
    if (answers[i] === '') { empty++; return; }
    const userVal = parseFloat(answers[i]);
    if (Math.abs(userVal - q.answer) < 0.06 * Math.abs(q.answer) + 0.05) correct++;
    else wrong++;
  });

  const score = Math.round((correct / questions.length) * 100);

  // Show result on current question
  renderQuestion(currentQ);
  updateNavGrid();

  // Show modal
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-empty').textContent = empty;
  document.getElementById('score-number').textContent = score;

  // Score circle
  const circle = document.getElementById('score-circle');
  circle.style.setProperty('--pct', `${score * 3.6}deg`);

  // Trophy
  const trophy = score >= 80 ? '🏆' : score >= 60 ? '🎓' : score >= 40 ? '📚' : '💪';
  document.getElementById('modal-trophy').textContent = trophy;

  document.getElementById('modal-overlay').classList.add('show');
}

// ─────────────────────────────────────────────
// RETRY
// ─────────────────────────────────────────────
function retryExam() {
  answers = new Array(questions.length).fill('');
  submitted = false;
  currentQ = 0;
  timerSeconds = 90 * 60;
  document.getElementById('modal-overlay').classList.remove('show');
  updateTimerDisplay();
  renderQuestion(0);
  updateNavGrid();
  updateProgress();
  startTimer();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildNavGrid();
  renderQuestion(0);
  updateNavGrid();
  updateProgress();
  startTimer();
});
</script>
